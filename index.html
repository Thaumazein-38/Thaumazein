<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>생능출판사 - 영원히 서재에 남을 책을 만든다는 일념으로</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Top Navigation Bar -->
    <header class="navbar glass">
        <div class="logo">
            <span class="logo-icon"></span>
            <span class="logo-text">생능출판</span>
        </div>
        <nav class="nav-links">
            <a href="#">생능 소개</a>
            <a href="#">브랜드 안내</a>
            <a href="#">도서정보</a>
            <a href="#">강의지원</a>
            <a href="#">출간지원</a>
            <a href="#">공지사항</a>
        </nav>
        <div class="nav-actions">
            <button class="icon-btn">🔍</button>
            <button class="icon-btn">🛒</button>
            <a href="#" class="auth-link">로그인</a>
            <a href="#" class="auth-link">회원가입</a>
        </div>
    </header>

    <!-- Main Content Area -->
    <main class="container">
        <!-- Left Text Section -->
        <section class="left-section">
            <div class="text-content">
                <span class="badge glass">영원히 서재에 남을 책을 만든다는 일념으로</span>
                <h1>혼과 마음을 담아<br>책을 만드는<br><span class="highlight">생능 출판사</span></h1>
                <a href="#" class="btn-primary glass-btn pochita-btn">
                    전체도서목록 <span>&rarr;</span>
                    <img src="images/pochita.png" alt="포치타" class="pochita-mascot">
                </a>
            </div>
        </section>

        <!-- Right Image Slider Section -->
        <section class="right-section">
            <div class="slider-container">
                <div class="slide active" style="background-image: url('images/image1.png');"></div>
                <div class="slide" style="background-image: url('images/image2.png');"></div>
                <div class="slide" style="background-image: url('images/reze.png');"></div>
            </div>
        </section>
    </main>

    <!-- Left Floating Pagination -->
    <aside class="left-pagination glass-menu">
        <div class="dot active"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
    </aside>

    <!-- Right Floating Sidebar -->
    <aside class="right-sidebar">
        <div class="sidebar-menu glass-menu">
            <a href="#" class="sidebar-item">
                <span class="icon">📖</span>
                <span>샘플 교재<br>신청안내</span>
            </a>
            <a href="#" class="sidebar-item">
                <span class="icon">📦</span>
                <span>단체구매<br>안내</span>
            </a>
            <a href="#" class="sidebar-item">
                <span class="icon">📝</span>
                <span>원고 접수</span>
            </a>
            <a href="#" class="sidebar-item">
                <span class="icon">✉️</span>
                <span>편집부에<br>메일 보내기</span>
            </a>
            <a href="#" class="sidebar-item">
                <span class="icon">📍</span>
                <span>오시는 길</span>
            </a>
        </div>
        <a href="#" class="floating-btn glass-btn accent">
            강의자료<br>다운로드<br>안내
        </a>
    </aside>

    <script src="script.js"></script>
</body>
</html>
